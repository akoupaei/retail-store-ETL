# This is a Databricks asset bundle definition for retail_sales.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: retail_sales
  uuid: 19a7d5f2-84fc-43a3-9ae0-b52b7c1a822f

include:
  - resources/*.yml
  - resources/*/*.yml

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://dbc-f80ed02c-3092.cloud.databricks.com
    variables:
      catalog: cscie103_catalog
      schema: ${workspace.current_user.short_name}
  prod:
    mode: production
    workspace:
      host: https://dbc-f80ed02c-3092.cloud.databricks.com
      # We explicitly deploy to /Workspace/Users/dak6610@g.harvard.edu to make sure we only have a single copy.
      root_path: /Workspace/Users/dak6610@g.harvard.edu/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: cscie103_catalog
      schema: prod
    permissions:
      - user_name: dak6610@g.harvard.edu
        level: CAN_MANAGE

# The main pipeline for retail_sales

resources:
  pipelines:
    retail_sales_etl:
      name: retail_sales_etl
      catalog: ${var.catalog}
      schema: ${var.schema}
      serverless: true
      root_path: "../src/retail_sales_etl"

      libraries:
        - glob:
            include: ../src/retail_sales_etl/transformations/**

      environment:
        dependencies:
          # We include every dependency defined by pyproject.toml by defining an editable environment
          # that points to the folder where pyproject.toml is deployed.
          # - --editable ${workspace.file_path}
